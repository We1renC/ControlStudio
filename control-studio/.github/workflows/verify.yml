name: Control Studio — Verification Suite

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  verify-js:
    name: JS Verify Scripts (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run full verification suite
        run: bash scripts/run_all_verify.sh
        working-directory: control-studio

      - name: Upload failure log on error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-failure-log
          path: control-studio/scripts/
          retention-days: 7

  typecheck:
    name: TypeScript Type Check (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install TypeScript
        run: npm install --save-dev typescript
        working-directory: control-studio

      - name: Run type check
        run: npx tsc --noEmit
        working-directory: control-studio

      - name: Generate API docs (P28-02)
        run: node scripts/generate_api_docs.mjs --quiet
        working-directory: control-studio

      - name: Verify API docs output
        run: |
          test -f docs/api/index.html && echo "✓ docs/api/index.html exists" || exit 1
          test -f docs/api/symbols.json && echo "✓ docs/api/symbols.json exists" || exit 1
          SYMBOLS=$(node -e "const s=require('./docs/api/symbols.json'); console.log(s.length)")
          echo "✓ ${SYMBOLS} symbols indexed"
        working-directory: control-studio

  verify-python:
    name: Python Cross-Tool Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-control + numpy
        run: pip install control numpy

      - name: Run Python cross-tool comparison
        run: python3 scripts/compare_python_control.py
        working-directory: control-studio

  benchmark:
    name: Performance Benchmark (informational)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    needs: verify-js

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run benchmark (informational only)
        run: |
          if [ -f scripts/benchmark.mjs ]; then
            node scripts/benchmark.mjs
          else
            echo "benchmark.mjs not yet created — skipping"
          fi
        working-directory: control-studio
