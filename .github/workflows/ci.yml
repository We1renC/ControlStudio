name: Math Verification CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: verify:all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Run full math verification suite
        run: bash control-studio/scripts/run_all_verify.sh
