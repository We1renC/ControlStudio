name: Math Verification CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: verify:all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run full math verification suite
        run: npm run verify:all
